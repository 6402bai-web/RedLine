<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="RED-LINE - 将心率转化为赛博朋克视觉艺术">
    <title>CYBER-PULSE | BIOMETRIC MONITOR</title>
    <style>
        :root { 
            --neon-red: #ff0033; 
            --neon-blue: #00f2ff;
            --neon-green: #00ff66;
            --neon-yellow: #ffcc00;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Courier New', monospace; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; 
            touch-action: manipulation;
        }
        
        #glow { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(255, 0, 51, 0.08) 0%, transparent 70%);
            box-shadow: 0 0 150px rgba(255, 0, 51, 0.15) inset;
            opacity: 0.5; pointer-events: none; z-index: 5; 
            transition: opacity 0.3s;
        }
        
        #glow.pulse {
            animation: glow-pulse 1s ease-out;
        }
        
        @keyframes glow-pulse {
            0% { opacity: 1; box-shadow: 0 0 200px rgba(255, 0, 51, 0.4) inset; }
            100% { opacity: 0.5; box-shadow: 0 0 150px rgba(255, 0, 51, 0.15) inset; }
        }

        .header { 
            margin-top: 6vh; text-align: center; z-index: 10; 
            position: relative; padding: 0 20px;
        }
        .bpm-container { position: relative; display: inline-block; }
        
        #bpm { 
            font-size: clamp(5rem, 20vw, 10rem); font-weight: 900; margin: 0; 
            color: #fff; position: relative; z-index: 2;
            letter-spacing: -5px;
            opacity: 0.2; 
            text-shadow: none;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #bpm.active {
            opacity: 1;
            text-shadow: 0 0 30px var(--neon-red), 0 0 60px rgba(255, 0, 51, 0.5);
        }

        #bpm.active::before, #bpm.active::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.7; z-index: -1;
        }
        #bpm.active::before {
            color: var(--neon-blue);
            animation: glitch-offset 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        }
        #bpm.active::after {
            color: var(--neon-red);
            animation: glitch-offset 1.5s infinite linear alternate;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        }

        @keyframes glitch-offset {
            0% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            100% { transform: translate(-1px, 2px); }
        }
        
        .unit {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--neon-red);
            opacity: 0.6;
            margin-left: 5px;
            vertical-align: super;
        }

        .meta { 
            font-size: clamp(0.5rem, 2vw, 0.7rem); letter-spacing: 4px; opacity: 0.5; 
            text-transform: uppercase; margin-top: 5px;
            color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue);
            transition: all 0.3s;
        }
        
        .meta.warning {
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
            animation: blink 1s infinite;
        }
        
        .meta.error {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
        }
        
        .meta.success {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .signal-indicator {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .signal-bar {
            width: 4px;
            height: 20px;
            background: #333;
            transition: all 0.3s;
        }
        
        .signal-bar.active {
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        #container { 
            position: relative; width: 100%; flex: 1; margin-top: auto; 
            border-top: 1px solid rgba(255, 0, 51, 0.1);
            background: repeating-linear-gradient(90deg, rgba(255, 0, 51, 0.02) 0px, rgba(255, 0, 51, 0.02) 1px, transparent 1px, transparent 40px);
            background-size: 40px 100%;
        }
        
        #container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        canvas { width: 100%; height: 100%; filter: contrast(1.1) brightness(1.2); }

        .button-area {
            padding: 20px;
            z-index: 20;
        }

        button { 
            padding: 15px 40px; background: transparent; color: var(--neon-red); 
            border: 1px solid var(--neon-red); cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 1rem;
            letter-spacing: 3px; font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover, button:active { 
            background: var(--neon-red); color: #000; 
            box-shadow: 0 0 30px var(--neon-red);
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        #disconnectBtn {
            display: none;
            color: var(--neon-yellow);
            border-color: var(--neon-yellow);
        }
        #disconnectBtn:hover {
            background: var(--neon-yellow);
        }

        .error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 51, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 90%;
        }
        
        .error-toast.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .header { margin-top: 4vh; }
            button { padding: 12px 30px; font-size: 0.9rem; }
            #container { height: 30vh !important; }
        }
    </style>
</head>
