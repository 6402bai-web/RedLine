<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="RED-LINE - 将心率转化为赛博朋克视觉艺术">
    <title>CYBER-PULSE | BIOMETRIC MONITOR</title>
    <style>
        :root { 
            --neon-red: #ff0033; 
            --neon-blue: #00f2ff;
            --neon-green: #00ff66;
            --neon-yellow: #ffcc00;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Courier New', monospace; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; 
            touch-action: manipulation;
        }

        #glow { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(255, 0, 51, 0.08) 0%, transparent 70%);
            box-shadow: 0 0 150px rgba(255, 0, 51, 0.15) inset;
            opacity: 0.5; pointer-events: none; z-index: 5; 
            transition: opacity 0.3s;
        }

        .header { 
            margin-top: 6vh; text-align: center; z-index: 10; 
            position: relative; padding: 0 20px;
        }

        #bpm { 
            font-size: clamp(5rem, 20vw, 10rem); font-weight: 900; margin: 0; 
            color: #fff; opacity: 0.2; 
            letter-spacing: -5px;
            transition: all 0.3s;
        }

        #bpm.active {
            opacity: 1;
            text-shadow: 0 0 30px var(--neon-red);
            animation: pulse-text 0.2s ease-out;
        }

        @keyframes pulse-text {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .unit { font-size: 1.5rem; color: var(--neon-red); margin-left: 5px; }

        .meta { 
            font-size: 0.7rem; letter-spacing: 4px; opacity: 0.5; 
            color: var(--neon-blue); margin-top: 5px;
        }

        #container { 
            position: relative; width: 100%; flex: 1; 
            background: repeating-linear-gradient(90deg, rgba(255, 0, 51, 0.03) 0, rgba(255, 0, 51, 0.03) 1px, transparent 1px, transparent 40px);
        }

        canvas { width: 100%; height: 100%; display: block; }

        .button-area { padding: 40px; z-index: 20; }

        button { 
            padding: 15px 40px; background: transparent; color: var(--neon-red); 
            border: 1px solid var(--neon-red); cursor: pointer;
            letter-spacing: 3px; font-weight: bold; transition: all 0.3s;
        }

        button:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 20px var(--neon-red); }

        .error-toast {
            position: fixed; top: 20px; background: var(--neon-red); color: #fff;
            padding: 10px 20px; display: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="glow"></div>
    <div class="error-toast" id="errorToast"></div>

    <div class="header">
        <h1 id="bpm" data-text="--">--<span class="unit">BPM</span></h1>
        <div id="status" class="meta">SYSTEM_OFFLINE</div>
    </div>

    <div id="container"><canvas id="canvas"></canvas></div>

    <div class="button-area">
        <button id="startBtn" onclick="initAll()">ESTABLISH LINK</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bpmEl = document.getElementById('bpm');
        const statusEl = document.getElementById('status');
        const errorToast = document.getElementById('errorToast');

        let audioCtx, masterGain;
        let points = [];
        let currentBpm = 0;
        let x = 0;

        // 初始化 Canvas 尺寸
        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resize);
        resize();

        function showError(msg) {
            errorToast.innerText = msg;
            errorToast.style.display = 'block';
            setTimeout(() => errorToast.style.display = 'none', 3000);
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.2;
            masterGain.connect(audioCtx.destination);
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        async function initAll() {
            try {
                initAudio();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                statusEl.textContent = "SEARCHING_FOR_DEVICE...";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const char = await service.getCharacteristic('heart_rate_measurement');

                await char.startNotifications();
                statusEl.textContent = "LINK_ACTIVE";
                document.getElementById('startBtn').style.display = 'none';

                char.addEventListener('characteristicvaluechanged', (e) => {
                    const value = e.target.value;
                    const bpm = value.getUint8(1);
                    updateBPM(bpm);
                });

            } catch (err) {
                showError("LINK_FAILED: " + err.message);
                statusEl.textContent = "SYSTEM_ERROR";
            }
        }

        function updateBPM(bpm) {
            currentBpm = bpm;
            bpmEl.textContent = bpm;
            bpmEl.classList.add('active');
            playBeep();
            setTimeout(() => bpmEl.classList.remove('active'), 200);
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#ff0033';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0033';

            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);

            // 模拟心电图波形
            const speed = 4;
            const centerY = canvas.height / 2;
            let targetY = centerY;

            // 简单的 QRS 波群模拟逻辑
            if (currentBpm > 0) {
                const period = (60 / currentBpm) * 60; // 帧周期
                const phase = x % period;
                
                if (phase > 0 && phase < 10) targetY -= phase * 5; // P波
                if (phase >= 10 && phase < 15) targetY += (phase-10) * 20; // QR
                if (phase >= 15 && phase < 20) targetY -= (phase-15) * 40; // RS
                if (phase >= 20 && phase < 30) targetY = centerY + (30-phase) * 5; // T波
            }

            points.push({x: canvas.width, y: targetY});
            
            for(let i = 0; i < points.length; i++) {
                points[i].x -= speed;
                if (i === 0) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }

            if (points.length > 500) points.shift();
            
            ctx.stroke();
            x++;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
